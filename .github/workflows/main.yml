# ============================================================
# Pipeline CI/CD — Contador de Tarefas
# ============================================================

name: CI/CD — Contador de Tarefas

# ------------------------------------------------------------
# GATILHOS: quando esta pipeline será executada
# - push na branch main: executa CI + CD (deploy)
# - pull_request para main: executa só CI (sem deploy)
# ------------------------------------------------------------
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# ------------------------------------------------------------
# PERMISSÕES GLOBAIS
# Necessário para o GitHub Actions escrever no GitHub Pages.
# "contents: read"  → lê o código do repositório
# "pages: write"    → publica no GitHub Pages
# "id-token: write" → autentica o deploy com OIDC (sem senha)
# Fonte: https://docs.github.com/en/actions/security-guides/automatic-token-authentication
# ------------------------------------------------------------
permissions:
  contents: read
  pages: write
  id-token: write

# ------------------------------------------------------------
# CONCORRÊNCIA
# Garante que só um deploy rode por vez.
# Se um novo push chegar enquanto um deploy está em andamento,
# o deploy em andamento NÃO é cancelado (evita deploy quebrado).
# Fonte: https://docs.github.com/en/actions/using-jobs/using-concurrency
# ------------------------------------------------------------
concurrency:
  group: "pages"
  cancel-in-progress: false

# ============================================================
# JOBS
# ============================================================
jobs:

  # ----------------------------------------------------------
  # JOB 1: CI — Integração Contínua
  # Roda em todo push e pull_request para a branch main.
  # Valida qualidade do código antes de qualquer deploy.
  # ----------------------------------------------------------
  ci:
    name: CI — Lint, Testes e Build
    runs-on: ubuntu-latest  # Máquina virtual Linux fornecida pelo GitHub

    steps:

      # Passo 1: Baixa o código do repositório para a máquina virtual
      - name: Checkout do código
        uses: actions/checkout@v4
        # Fonte: https://github.com/actions/checkout

      # Passo 2: Instala e configura o Node.js
      # "cache: npm" guarda o cache do npm entre execuções,
      # acelerando a instalação nas próximas vezes.
      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
        

      # Passo 3: Instala as dependências do projeto
      # "npm ci" é preferível ao "npm install" em pipelines:
      # - usa exatamente as versões do package-lock.json
      # - falha se houver divergência 
      
      - name: Instalar dependências (npm ci)
        run: npm install

      # Passo 4: Executa o linter (ESLint via next lint)
      # Verifica erros de código sem precisar executar a aplicação.
      # O script "lint" deve existir no package.json: "next lint"
      - name: Rodar lint (npm run lint)
        run: npm run lint

      # Passo 5: Executa todos os testes unitários com Jest
      # A flag CI=true faz o Jest não abrir o modo interativo.
      - name: Rodar testes 
        run: npm test
        env:
          CI: true

      # Passo 6: Gera o build de produção da aplicação
      - name: Build de produção (npm run build)
        run: npm run build

      # Passo 7 (só no CD): Prepara o artefato para o GitHub Pages
      # Só executa em push na main (não em pull_request).
      - name: 📤 Preparar artefato para GitHub Pages
        if: github.event_name == 'push' && github.ref == 'main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out  
          
  # ----------------------------------------------------------
  # JOB 2: CD — Deploy para GitHub Pages
  # Só executa após o job "ci" passar com sucesso.
  # Usa o GITHUB_TOKEN automático — não precisa configurar secret.
  # ----------------------------------------------------------
  deploy:
    name: CD — Deploy para GitHub Pages
    runs-on: ubuntu-latest

    # Este job só roda se:
    # 1. O job "ci" terminou com sucesso
    # 2. O push foi na branch main
    needs: ci
    if: github.event_name == 'push' && github.ref == 'main'

    # Ambiente do GitHub Pages — aparece na aba "Environments" do repositório
    # e mostra a URL pública do site após o deploy.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      # Faz o deploy do artefato gerado pelo job "ci" para o GitHub Pages.
      # O GITHUB_TOKEN é gerado automaticamente pelo GitHub Actions —
      # não é necessário criar ou configurar nenhum secret manualmente.
      # Fonte: https://github.com/actions/deploy-pages
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        # O GITHUB_TOKEN é usado automaticamente via permissões declaradas no topo.
        # Fonte: https://docs.github.com/en/actions/security-guides/automatic-token-authentication
